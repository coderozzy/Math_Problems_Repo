site_name: Math Problems
site_url: https://coderozzy.github.io/Math_Problems_Repo/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/config.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: pl
          name: Polski
          build: true
          nav:
            - Home: 'index.md'
            - 'Wykład: Matematyka':
              - Algebra:
                - '1. Macierze i operacje': '1_Algebra/01_matrices_and_operations.md'
                - '2. Wyznaczniki': '1_Algebra/02_determinants.md'
                - '3. Odwracanie macierzy': '1_Algebra/03_matrix_inversion.md'
                - '4. Układy równań': '1_Algebra/04_systems_of_equations.md'
              - Geometria:
                - '1. Wektory': '2_Geometria/01_vectors.md'
                - '2. Proste': '2_Geometria/02_lines.md'
                - '3. Płaszczyzny': '2_Geometria/03_planes.md'
                - '4. Prosta i płaszczyzna': '2_Geometria/04_line_and_plane.md'
              - Analiza:
                - '1. Granice ciągów': '3_Analiza/01_sequence_limits.md'
                - '2. Granice funkcji': '3_Analiza/02_function_limits.md'
                - '3. Pochodne funkcji': '3_Analiza/03_derivatives.md'
                - '4. Badanie funkcji': '3_Analiza/04_function_analysis.md'
                - '5. Całki': '3_Analiza/05_integrals.md'
                - '6. Zastosowania rachunku': '3_Analiza/06_applications.md'
            - 'Wykład: Metody probabilistyczne':
              - Metody probabilistyczne:
                - Podstawowe:
                    - '1. Zdarzenia i prawdopodobieństwo': '4_Metody_probabilistyczne/basic/01_events_and_probability.md'
                    - '2. Kombinatoryka': '4_Metody_probabilistyczne/basic/02_combinatorics.md'
                    - 'Rozwiązania Kombinatoryka':
                      - 'Zadanie 1': '4_Metody_probabilistyczne/basic/solutions_02_combinatorics/solution_01.md'
                      - 'Zadanie 2': '4_Metody_probabilistyczne/basic/solutions_02_combinatorics/solution_02.md'
                      - 'Zadanie 3': '4_Metody_probabilistyczne/basic/solutions_02_combinatorics/solution_03.md'
                      - 'Zadanie 4': '4_Metody_probabilistyczne/basic/solutions_02_combinatorics/solution_04.md'
